<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      padding: 16px;
      margin: 0;
    }
    h3 {
      margin: 0 0 16px 0;
      color: #333;
      font-size: 16px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      box-sizing: border-box;
    }
    .btn-primary {
      background: #ff0000;
      color: white;
    }
    .btn-primary:hover {
      background: #cc0000;
    }
    .btn-secondary {
      background: #065fd4;
      color: white;
    }
    .btn-secondary:hover {
      background: #004ba0;
    }
    .btn-success {
      background: #0f9d58;
      color: white;
    }
    .btn-success:hover {
      background: #0a7d45;
    }
    .note {
      font-size: 12px;
      color: #666;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h3>YouTubeリサーチ</h3>
  <button class="btn btn-primary" onclick="runResearch('competitor')">① 競合リサーチを実行</button>
  <button class="btn btn-secondary" onclick="runResearch('keyword')">② 検索キーワードリサーチを実行</button>
  <button class="btn btn-success" onclick="runResearch('ranking')">③ 再生数ランキングを実行</button>
  <p class="note">各ボタンをクリックすると、対応するリサーチが実行されます。</p>
  <script>
    function runResearch(type) {
      google.script.run
        .withSuccessHandler(function() {})
        .withFailureHandler(function(err) { alert('エラー: ' + err.message); })
        .runResearchFromSidebar_(type);
    }
  </script>
</body>
</html>
