<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #f8f9fa;
      padding: 16px;
      color: #202124;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8eaed;
    }
    .header-icon { font-size: 20px; }
    .header-title { font-size: 15px; font-weight: 700; color: #202124; }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: #9aa0a6;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 12px 0 6px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 6px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .btn-icon { font-size: 16px; flex-shrink: 0; }
    .btn-text { flex: 1; }
    .btn-arrow { font-size: 12px; color: rgba(255,255,255,0.7); }

    .btn-red    { background: #ff0000; color: #fff; }
    .btn-red:hover { background: #cc0000; }

    .btn-blue   { background: #1a73e8; color: #fff; }
    .btn-blue:hover { background: #1557b0; }

    .btn-green  { background: #0f9d58; color: #fff; }
    .btn-green:hover { background: #0a7d45; }

    .btn-gray   { background: #e8eaed; color: #3c4043; }
    .btn-gray:hover { background: #d8dadd; }

    .divider {
      height: 1px;
      background: #e8eaed;
      margin: 10px 0;
    }
    .note {
      font-size: 11px;
      color: #9aa0a6;
      line-height: 1.5;
      margin-top: 14px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8eaed;
    }

    /* 実行中のボタン状態 */
    .btn.loading { opacity: 0.6; cursor: not-allowed; }

    /* トースト */
    #toast {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: #fff;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      z-index: 999;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-icon">📺</span>
    <span class="header-title">YouTubeリサーチ</span>
  </div>

  <div class="section-label">チャンネル調査</div>

  <button class="btn btn-red" onclick="runResearch('competitor')">
    <span class="btn-icon">🔍</span>
    <span class="btn-text">① 競合リサーチを実行</span>
    <span class="btn-arrow">›</span>
  </button>

  <div class="divider"></div>

  <div class="section-label">キーワード調査</div>

  <button class="btn btn-blue" onclick="runResearch('keyword')">
    <span class="btn-icon">🔑</span>
    <span class="btn-text">② 検索キーワードリサーチ</span>
    <span class="btn-arrow">›</span>
  </button>

  <button class="btn btn-blue" onclick="runResearch('ranking')">
    <span class="btn-icon">🏆</span>
    <span class="btn-text">③ 再生数ランキング</span>
    <span class="btn-arrow">›</span>
  </button>

  <div class="divider"></div>

  <div class="section-label">チャンネル情報</div>

  <button class="btn btn-gray" onclick="runResearch('channel')">
    <span class="btn-icon">📊</span>
    <span class="btn-text">④ チャンネル情報を取得</span>
    <span class="btn-arrow">›</span>
  </button>

  <div class="note">
    各ボタンをクリックすると設定ダイアログが開きます。<br>
    チャンネル・件数・動画タイプを選んで実行できます。
  </div>

  <div id="toast"></div>

<script>
  function runResearch(type) {
    google.script.run
      .withSuccessHandler(function() {})
      .withFailureHandler(function(err) {
        showToast('エラー: ' + err.message);
      })
      .runResearchFromSidebar_(type);
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 3500);
  }
</script>
</body>
</html>
