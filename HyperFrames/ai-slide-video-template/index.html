<!doctype html>
<!--
  AI-planned handwritten slide video composition for HyperFrames.
  The page reads slide-video-data.js and renders each frame from chunk timing,
  so AI agents can generate slide plans without editing a video timeline.
-->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>AI Slide Video Template - HyperFrames</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #101010;
      }

      body {
        display: grid;
        place-items: center;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--bg, #fffdf8);
        color: var(--ink, #172033);
        font-family: "Noto Sans JP", system-ui, sans-serif;
        letter-spacing: 0;
      }

      .paper-noise {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.28;
        background-image:
          radial-gradient(circle at 20% 10%, rgba(23, 32, 51, 0.05) 0 1px, transparent 1px),
          radial-gradient(circle at 70% 70%, rgba(249, 115, 22, 0.06) 0 1px, transparent 1px);
        background-size: 34px 34px, 46px 46px;
      }

      #slide-title {
        position: absolute;
        top: 48px;
        left: 96px;
        right: 96px;
        margin: 0;
        text-align: center;
        white-space: pre-wrap;
        line-height: 1.08;
        font-size: 78px;
        font-weight: 900;
        color: var(--ink, #172033);
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.85);
      }

      #generated-layer,
      #chunk-layer {
        position: absolute;
        inset: 0;
      }

      #generated-layer {
        z-index: 1;
        pointer-events: none;
      }

      #slide-title {
        z-index: 3;
      }

      #chunk-layer {
        z-index: 4;
        pointer-events: none;
      }

      .generated-layer {
        position: absolute;
        object-fit: contain;
        opacity: var(--layer-opacity, 1);
        transform: translate(var(--layer-x, 0), var(--layer-y, 0)) scale(var(--layer-scale, 1)) rotate(var(--layer-rotate, 0deg));
        transform-origin: center;
        clip-path: inset(0 var(--layer-clip-right, 0%) 0 0);
        filter: drop-shadow(0 12px 0 rgba(23, 32, 51, 0.05));
        will-change: transform, opacity, clip-path;
      }

      .chunk {
        position: absolute;
        display: grid;
        place-items: center;
        white-space: pre-wrap;
        text-align: center;
        line-height: 1.16;
        font-weight: 900;
        color: var(--chunk-color, var(--ink, #172033));
        opacity: var(--chunk-opacity, 1);
        transform: translate(var(--chunk-x, 0), var(--chunk-y, 0)) scale(var(--chunk-scale, 1)) rotate(var(--chunk-rotate, 0deg));
        transform-origin: center;
        clip-path: inset(0 var(--chunk-clip-right, 0%) 0 0);
        filter: drop-shadow(0 8px 0 rgba(23, 32, 51, 0.05));
      }

      .chunk-card,
      .chunk-list,
      .chunk-sketch {
        border: 5px solid currentColor;
        border-radius: 14px 10px 18px 12px;
        background: rgba(255, 255, 255, 0.7);
      }

      .chunk-card::after,
      .chunk-list::after,
      .chunk-sketch::after {
        content: "";
        position: absolute;
        inset: 10px -8px -8px 10px;
        z-index: -1;
        border: 3px solid rgba(23, 32, 51, 0.13);
        border-radius: inherit;
      }

      .chunk-highlight {
        padding: 14px 34px;
        color: #172033;
      }

      .chunk-highlight::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        border: 4px solid var(--chunk-color, #facc15);
        border-radius: 48% 52% 50% 46% / 22% 30% 24% 28%;
        background: color-mix(in srgb, var(--chunk-color, #facc15) 24%, white);
      }

      .chunk-badge {
        padding: 18px;
        border: 5px solid currentColor;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.75);
      }

      .chunk-arrow {
        align-items: center;
        padding: 14px 18px 42px;
        border: 5px solid currentColor;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.72);
      }

      .chunk-arrow::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -72px;
        width: 0;
        height: 0;
        transform: translateX(-50%);
        border-left: 72px solid transparent;
        border-right: 72px solid transparent;
        border-top: 88px solid currentColor;
      }

      .chunk-connector {
        font-size: 38px;
      }

      .chunk-connector::before {
        content: "";
        position: absolute;
        top: 48%;
        left: 0;
        right: 0;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
      }

      .chunk-connector::after {
        content: "";
        position: absolute;
        right: -4px;
        top: calc(48% - 22px);
        width: 0;
        height: 0;
        border-top: 25px solid transparent;
        border-bottom: 25px solid transparent;
        border-left: 42px solid currentColor;
      }

      .chunk-connector span {
        position: relative;
        top: -42px;
        padding: 5px 14px;
        background: var(--bg, #fffdf8);
      }

      .chunk-list {
        justify-items: start;
        align-content: center;
        padding: 28px 36px;
        text-align: left;
      }

      .chunk-list span {
        display: block;
        width: 100%;
      }

      .chunk-sketch {
        color: var(--chunk-color, #172033);
        background:
          linear-gradient(rgba(23, 32, 51, 0.08) 1px, transparent 1px),
          rgba(255, 255, 255, 0.68);
        background-size: 100% 34px;
      }

      #subtitle-band {
        position: absolute;
        z-index: 5;
        left: 0;
        right: 0;
        bottom: 0;
        min-height: 126px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 22px 120px 26px;
        background: var(--subtitle-bg, #050505);
        color: var(--subtitle-text, #ffffff);
        font-size: 34px;
        font-weight: 800;
        line-height: 1.35;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="ai-slide-video-template"
      data-start="0"
      data-duration="96"
      data-width="1920"
      data-height="1080"
      data-fps="30"
    >
      <div class="paper-noise"></div>
      <h1 id="slide-title" class="clip" data-start="0" data-duration="96" data-track-index="1"></h1>
      <div id="generated-layer" class="clip" data-start="0" data-duration="96" data-track-index="2"></div>
      <div id="chunk-layer" class="clip" data-start="0" data-duration="96" data-track-index="3"></div>
      <div id="subtitle-band" class="clip" data-start="0" data-duration="96" data-track-index="4"></div>
    </div>

    <script src="./slide-video-data.js"></script>
    <script>
      /**
       * Frame renderer for AI-generated slide plans.
       * Rendering is deterministic: given a frame number, it rebuilds the title,
       * chunk states, and subtitle band without relying on a running timeline.
       */
      const video = window.AI_SLIDE_VIDEO;
      const root = document.getElementById("root");
      const title = document.getElementById("slide-title");
      const generatedLayer = document.getElementById("generated-layer");
      const chunkLayer = document.getElementById("chunk-layer");
      const subtitleBand = document.getElementById("subtitle-band");
      const durationSeconds = video.totalFrames / video.fps;

      root.style.setProperty("--bg", video.style.background);
      root.style.setProperty("--ink", video.style.ink);
      root.style.setProperty("--subtitle-bg", video.style.subtitleBg);
      root.style.setProperty("--subtitle-text", video.style.subtitleText);

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const easeOut = (value) => 1 - Math.pow(1 - clamp(value, 0, 1), 3);
      const activeSlide = (frame) => {
        return video.slides.find((slide) => frame >= slide.fromFrame && frame < slide.fromFrame + slide.durationFrames) || video.slides[video.slides.length - 1];
      };
      const assetBase = (video.assetsBase || "").replace(/\/$/, "");
      const isExternalSrc = (src) => /^(https?:|data:|\/)/.test(src);
      const resolveAssetSrc = (src) => {
        if (!src || isExternalSrc(src) || !assetBase) {
          return src;
        }

        return `${assetBase}/${src.replace(/^\.\//, "")}`;
      };
      const fontSizeFor = (chunk) => `${chunk.fontSize || (chunk.type === "connector" ? 38 : chunk.type === "list" ? 44 : 48)}px`;
      const applyEnterMotion = (element, prefix, item, progress) => {
        if (item.enter === "fade") {
          return;
        }

        if (item.enter === "pop") {
          element.style.setProperty(`--${prefix}-scale`, String(0.84 + progress * 0.16));
        } else if (item.enter === "rise") {
          element.style.setProperty(`--${prefix}-y`, `${(1 - progress) * 32}px`);
          element.style.setProperty(`--${prefix}-scale`, String(0.96 + progress * 0.04));
        } else if (item.enter === "draw") {
          element.style.setProperty(`--${prefix}-clip-right`, `${(1 - progress) * 100}%`);
          element.style.setProperty(`--${prefix}-scale`, String(0.98 + progress * 0.02));
        } else if (item.enter === "slide") {
          const fromX = item.fromX ?? 40;
          const fromY = item.fromY ?? 0;
          element.style.setProperty(`--${prefix}-x`, `${(1 - progress) * fromX}px`);
          element.style.setProperty(`--${prefix}-y`, `${(1 - progress) * fromY}px`);
        } else if (item.enter === "zoom") {
          element.style.setProperty(`--${prefix}-scale`, String(0.7 + progress * 0.3));
        }
      };
      const createGeneratedLayer = (imageLayer, localFrame) => {
        const start = imageLayer.at ?? imageLayer.start ?? 0;
        const end = imageLayer.end ?? Number.POSITIVE_INFINITY;
        const elapsed = localFrame - start;
        if (elapsed < 0 || localFrame >= end) {
          return null;
        }

        const progress = easeOut(elapsed / (imageLayer.duration || 18));
        const element = document.createElement("img");
        element.className = "generated-layer";
        element.src = resolveAssetSrc(imageLayer.src);
        element.alt = imageLayer.alt || "";
        element.decoding = "async";
        element.draggable = false;
        element.style.left = `${imageLayer.x}px`;
        element.style.top = `${imageLayer.y}px`;
        element.style.width = `${imageLayer.w}px`;
        element.style.height = `${imageLayer.h}px`;
        element.style.objectFit = imageLayer.fit || "contain";
        element.style.zIndex = imageLayer.zIndex || 0;
        element.style.setProperty("--layer-opacity", String((imageLayer.opacity ?? 1) * progress));
        element.style.setProperty("--layer-rotate", `${imageLayer.rotate || 0}deg`);
        applyEnterMotion(element, "layer", imageLayer, progress);
        return element;
      };
      const createChunk = (chunk, localFrame) => {
        const elapsed = localFrame - chunk.at;
        if (elapsed < 0) {
          return null;
        }

        const progress = easeOut(elapsed / 16);
        const element = document.createElement("div");
        element.className = `chunk chunk-${chunk.type}`;
        element.style.left = `${chunk.x}px`;
        element.style.top = `${chunk.y}px`;
        element.style.width = `${chunk.w}px`;
        element.style.height = `${chunk.h}px`;
        element.style.fontSize = fontSizeFor(chunk);
        element.style.fontWeight = chunk.weight || 900;
        element.style.setProperty("--chunk-color", chunk.color || video.style.ink);
        element.style.setProperty("--chunk-opacity", String(progress));

        if (chunk.enter === "write") {
          element.style.setProperty("--chunk-clip-right", `${(1 - progress) * 100}%`);
        }

        applyEnterMotion(element, "chunk", chunk, progress);

        const text = document.createElement("span");
        text.textContent = chunk.text;
        element.appendChild(text);
        return element;
      };
      const renderFrame = (rawFrame) => {
        const frame = clamp(Math.round(rawFrame), 0, video.totalFrames - 1);
        const slide = activeSlide(frame);
        const localFrame = frame - slide.fromFrame;

        title.textContent = slide.title;
        subtitleBand.textContent = slide.subtitle;
        generatedLayer.replaceChildren();
        chunkLayer.replaceChildren();

        const imageLayers = [...(slide.layers || [])].sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
        for (const imageLayer of imageLayers) {
          const element = createGeneratedLayer(imageLayer, localFrame);
          if (element) {
            generatedLayer.appendChild(element);
          }
        }

        for (const chunk of slide.chunks) {
          const element = createChunk(chunk, localFrame);
          if (element) {
            chunkLayer.appendChild(element);
          }
        }
      };

      window.__hf = {
        duration: durationSeconds,
        fps: video.fps,
        width: video.width,
        height: video.height,
        seek(time) {
          renderFrame(time * video.fps);
        }
      };

      window.__timelines = window.__timelines || {};
      window.__timelines[video.id] = {
        seek(time) {
          renderFrame(time * video.fps);
          return this;
        },
        pause() {
          return this;
        },
        duration() {
          return durationSeconds;
        },
        totalDuration() {
          return durationSeconds;
        }
      };

      renderFrame(0);
    </script>
  </body>
</html>
