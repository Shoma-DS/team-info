-->
<html lang="ja">

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #111;
      }

      body {
        display: grid;
        place-items: center;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #fafafa;
        color: #000;
        font-family: "Noto Sans JP", sans-serif;

        /*
         * HyperFrames Studio のサイドバー編集が seek() で上書きされないよう、
         * CSS カスタムプロパティ経由で render 関数が値を渡す。
         * ユーザーが要素に直接 inline style を設定した場合、
         * inline style が var() 参照より優先されるため、編集が保持される。
         */
        --hook-text-top: 20%;
        --hook-text-color: #000000;
        --hook-text-font-size: 89.56px;
        --hook-text-transform: none;
        --hook-image-wrap-top: auto;
        --hook-image-wrap-bottom: 5%;
        --hook-image-wrap-height: 54%;
        --hook-image-max-width: 94%;
        --section-title-display: block;
        --section-title-opacity: 1;
        --section-title-font-size: 82px;
        --section-title-color: #000000;
        --section-visual-opacity: 1;
        --section-visual-transform: scale(1);
        --cta-image-transform: scale(1);
        --subtitle-display: none;
        --subtitle-opacity: 1;
      }

      .scene {
        position: absolute;
        inset: 0;
        display: none;
        font-size: 0;
        overflow: visible;
      }

      .scene.is-visible {
        display: block;
      }

      .white-scene {
        background: #fff;
      }

      #hook-image-wrap,
      #section-visual-wrap,
      #cta-image-wrap {
        position: absolute;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }

      #hook-image-wrap {
        top: var(--hook-image-wrap-top, auto);
        bottom: var(--hook-image-wrap-bottom, 5%);
        height: var(--hook-image-wrap-height, 54%);
      }

      #hook-image {
        max-height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.08));
        max-width: var(--hook-image-max-width, 94%);
      }

      #hook-text {
        position: absolute;
        width: 100%;
        padding: 0 5%;
        text-align: center;
        white-space: pre-wrap;
        line-break: strict;
        word-break: keep-all;
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: 0;
        text-shadow: 0 0 15px #fff, 0 0 15px #fff;
        z-index: 10;
        top: var(--hook-text-top, 20%);
        color: var(--hook-text-color, #000000);
        font-size: var(--hook-text-font-size, 89.56px);
        transform: var(--hook-text-transform, none);
      }

      #section-title {
        position: absolute;
        top: 10%;
        left: 0;
        width: 100%;
        padding: 0 6%;
        margin: 0;
        text-align: center;
        white-space: pre-wrap;
        word-break: keep-all;
        font-weight: 900;
        line-height: 1.12;
        letter-spacing: 0;
        z-index: 2;
        display: var(--section-title-display, block);
        opacity: var(--section-title-opacity, 1);
        font-size: var(--section-title-font-size, 82px);
        color: var(--section-title-color, #000);
      }

      #section-visual-wrap {
        top: 27%;
        height: 36%;
        align-items: flex-start;
        transform-origin: center top;
        opacity: var(--section-visual-opacity, 1);
        transform: var(--section-visual-transform, scale(1));
      }

      #section-visual {
        object-fit: contain;
      }

      #section-visual.is-photo {
        width: 88%;
        height: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        object-position: center 58%;
        border: 3px solid #fff;
        border-radius: 8px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
      }

      #section-visual.is-illustration {
        max-width: 94%;
        max-height: 100%;
      }

      #cta-image-wrap {
        top: 12%;
        height: 62%;
      }

      #cta-image {
        max-width: 92%;
        max-height: 100%;
        object-fit: contain;
        transform: var(--cta-image-transform, scale(1));
      }

      #subtitle {
        position: absolute;
        left: 7%;
        right: 7%;
        bottom: 35%;
        height: 250px;
        display: var(--subtitle-display, none);
        align-items: center;
        justify-content: center;
        text-align: center;
        white-space: pre-wrap;
        line-break: strict;
        word-break: keep-all;
        font-size: 72px;
        font-weight: 900;
        line-height: 1.16;
        letter-spacing: 0;
        color: #000;
        text-shadow: 0 4px 10px rgba(255, 255, 255, 0.86), 0 0 15px rgba(255, 255, 255, 0.86);
        pointer-events: none;
        z-index: 100;
        opacity: var(--subtitle-opacity, 1);
      }

      audio {
        display: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"

    >

      <audio id="audio-sfx-1" class="clip" src="remotion-public/audio/転職ショート_20260416/sfx/logo-animation2.mp3" data-start="0" data-end="2.906848" data-duration="2.906848" data-track-index="-9" data-volume="0.12" style="z-index: 8"></audio>
      <audio id="audio-sfx-2" class="clip" src="remotion-public/audio/転職ショート_20260416/sfx/cute-motion1.mp3" data-start="3.933333" data-end="4.939410" data-duration="1.006077" data-track-index="-8" data-volume="0.08" style="z-index: 7"></audio>
      <audio id="audio-sfx-3" class="clip" src="remotion-public/audio/転職ショート_20260416/sfx/papa1.mp3" data-start="8" data-end="8.836576" data-duration="0.836576" data-track-index="-9" data-volume="0.06" style="z-index: 8"></audio>
      <audio id="audio-sfx-4" class="clip" src="remotion-public/audio/転職ショート_20260416/sfx/nyu3.mp3" data-start="30.166667" data-end="30.430975" data-duration="0.264308" data-track-index="-8" data-volume="0.06" style="z-index: 7"></audio>
      <audio id="audio-sfx-5" class="clip" src="remotion-public/audio/転職ショート_20260416/sfx/papa1.mp3" data-start="50.333333" data-end="51.169909" data-duration="0.836576" data-track-index="-9" data-volume="0.06" style="z-index: 8"></audio>
      <audio id="audio-sfx-6" class="clip" src="remotion-public/audio/転職ショート_20260416/sfx/cute-motion1.mp3" data-start="70.333333" data-end="71.339410" data-duration="1.006077" data-track-index="-8" data-volume="0.06" style="z-index: 7"></audio>
    </div>

    <script src="./tenshoku-data.js"></script>
    <script>
      /**
       * HyperFrames seek adapter for the Remotion viral template.
       * 全フレームを現在時刻から再計算し、画像切替・字幕・音声メタデータを
       * HyperFrames の seek/capture ループから扱えるようにする。
       */
      const video = window.TENSHOKU_VIDEO;
      const durationSeconds = video.totalFrames / video.fps;
      const assetPath = (name) => `${video.assetsBase}/${name}`;
      const audioPath = (name) => `${video.audioBase}/${name}`;
      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const lerp = (from, to, progress) => from + (to - from) * progress;
      const smooth = (progress) => 1 - Math.pow(1 - clamp(progress, 0, 1), 3);
      const fadeIn = (frame, frames) => clamp(frame / frames, 0, 1);
      const setText = (element, value) => {
        if (element.textContent !== value) {
          element.textContent = value;
        }
      };
      const setImage = (element, value) => {
        if (!value) {
          element.removeAttribute("src");
          return;
        }
        if (element.getAttribute("src") !== value) {
          element.setAttribute("src", value);
        }
      };
      const showOnly = (active) => {
        for (const scene of [dom.hookScene, dom.sectionScene, dom.ctaScene]) {
          scene.classList.toggle("is-visible", scene === active);
        }
      };
      const wrapLine = (line, maxChars) => {
        const clean = line.trim();
        if (clean.length <= maxChars) {
          return clean;
        }
        const lines = [];
        for (let index = 0; index < clean.length; index += maxChars) {
          lines.push(clean.slice(index, index + maxChars));
        }
        return lines.join("\n");
      };
      const wrapText = (text, maxChars, preserveBreaks = true) => {
        if (!text) {
          return "";
        }
        const baseLines = preserveBreaks ? text.split("\n") : [text.replace(/\s+/g, "")];
        return baseLines.map((line) => wrapLine(line, maxChars)).join("\n");
      };
      const longestLineLength = (text) => Math.max(...text.split("\n").map((line) => line.length), 1);
      const visualScale = (visual) => {
        if (!visual || visual.kind === "photo") {
          return 1;
        }
        if (visual.src.includes("illust_joushi")) {
          return 4.25;
        }
        if (visual.src.includes("illust_mushi")) {
          return 2.05;
        }
        if (visual.src.includes("illust_kazetooshi")) {
          return 2.08;
        }
        if (visual.src.includes("illust_jinzai")) {
          return 1.98;
        }
        return visual.src.includes("illust_") ? 1.38 : 1.18;
      };
      const getActiveVisual = (section, localFrame) => {
        for (let index = 0; index < section.visuals.length; index += 1) {
          const visual = section.visuals[index];
          const next = section.visuals[index + 1];
          const toFrame = next ? next.fromFrame : section.durationFrames;
          if (localFrame >= visual.fromFrame && localFrame < toFrame) {
            return visual;
          }
        }
        return section.visuals[section.visuals.length - 1];
      };
      const activeSubtitle = (frame) => {
        const lookupFrame = frame + 6;
        return video.subtitles.find((entry) => lookupFrame >= entry.from && lookupFrame < entry.to) || null;
      };
      const dom = {
        root: document.getElementById("root"),
        hookScene: document.getElementById("hook-scene"),
        hookText: document.getElementById("hook-text"),
        hookImageWrap: document.getElementById("hook-image-wrap"),
        hookImage: document.getElementById("hook-image"),
        sectionScene: document.getElementById("section-scene"),
        sectionTitle: document.getElementById("section-title"),
        sectionVisualWrap: document.getElementById("section-visual-wrap"),
        sectionVisual: document.getElementById("section-visual"),
        ctaScene: document.getElementById("cta-scene"),
        ctaImageWrap: document.getElementById("cta-image-wrap"),
        ctaImage: document.getElementById("cta-image"),
        subtitle: document.getElementById("subtitle")
      };
      const preloadVisuals = () => {
        const names = new Set([
          video.hook.image,
          ...video.hook.callouts.map((callout) => callout.image),
          ...video.sections.flatMap((section) => section.visuals.map((visual) => visual.src)),
          video.cta.image1,
          video.cta.image2
        ]);
        for (const name of names) {
          const link = document.createElement("link");
          link.rel = "preload";
          link.as = "image";
          link.href = assetPath(name);
          document.head.appendChild(link);
        }
      };
      const rootStyle = dom.root.style;
      const renderHook = (frame) => {
        const callout = [...video.hook.callouts].reverse().find((entry) => frame >= entry.fromFrame);
        const text = wrapText(callout ? callout.text : video.hook.text, callout ? 9 : 9, true);
        const localFrame = callout ? frame - callout.fromFrame : frame;
        const scale = lerp(0.92, 1, smooth(localFrame / 10));
        setText(dom.hookText, text);
        setImage(dom.hookImage, assetPath(callout ? callout.image : video.hook.image));
        rootStyle.setProperty("--hook-text-top", callout ? "31%" : "20%");
        rootStyle.setProperty("--hook-text-color", callout ? "#000000" : "#ff2a2a");
        rootStyle.setProperty("--hook-text-font-size", `${Math.min(callout ? 130 : 136, 860 / longestLineLength(text))}px`);
        rootStyle.setProperty("--hook-text-transform", `scale(${scale})`);
        rootStyle.setProperty("--hook-image-wrap-top", callout ? "45%" : "auto");
        rootStyle.setProperty("--hook-image-wrap-bottom", callout ? "auto" : "5%");
        rootStyle.setProperty("--hook-image-wrap-height", callout ? "38%" : "54%");
        rootStyle.setProperty("--hook-image-max-width", callout ? "78%" : "94%");
      };
      const renderSection = (frame, section) => {
        const localFrame = frame - section.fromFrame;
        const title = wrapText(section.title, 10, false);
        const titleSize = Math.min(88, 670 / longestLineLength(title));
        const visual = getActiveVisual(section, localFrame);
        const visualLocal = localFrame - visual.fromFrame;
        const pop = lerp(0.92, 1, smooth(Math.max(0, localFrame - 5) / 10));
        const opacity = lerp(0.68, 1, fadeIn(visualLocal, 5));
        rootStyle.setProperty("--section-title-display", "block");
        setText(dom.sectionTitle, title);
        setImage(dom.sectionVisual, assetPath(visual.src));
        rootStyle.setProperty("--section-title-opacity", `${fadeIn(localFrame, 10)}`);
        rootStyle.setProperty("--section-title-font-size", `${titleSize}px`);
        rootStyle.setProperty("--section-title-color", "#000000");
        dom.sectionVisual.classList.toggle("is-photo", visual.kind === "photo");
        dom.sectionVisual.classList.toggle("is-illustration", visual.kind !== "photo");
        rootStyle.setProperty("--section-visual-opacity", `${opacity}`);
        rootStyle.setProperty("--section-visual-transform", `scale(${pop * visualScale(visual)})`);
      };
      const renderCta = (frame) => {
        const localFrame = frame - video.cta.fromFrame;
        const src = localFrame >= video.cta.switchFrame ? video.cta.image2 : video.cta.image1;
        setImage(dom.ctaImage, assetPath(src));
        rootStyle.setProperty("--cta-image-transform", `scale(${lerp(1, 1.05, localFrame / video.cta.durationFrames)})`);
      };
      const renderSubtitle = (frame) => {
        const entry = activeSubtitle(frame);
        if (!entry || !entry.text) {
          rootStyle.setProperty("--subtitle-display", "none");
          return;
        }
        const lookupFrame = frame + 6;
        const duration = entry.to - entry.from;
        const local = lookupFrame - entry.from;
        const opacity = Math.min(fadeIn(local, 3), fadeIn(duration - local, 3));
        setText(dom.subtitle, wrapText(entry.text, 11, true));
        rootStyle.setProperty("--subtitle-display", "flex");
        rootStyle.setProperty("--subtitle-opacity", `${opacity}`);
      };
      const renderFrame = (rawFrame) => {
        const frame = clamp(Math.round(rawFrame), 0, video.totalFrames - 1);
        if (frame < video.hook.durationFrames) {
          showOnly(dom.hookScene);
          renderHook(frame);
        } else {
          const section = video.sections.find((entry) => frame >= entry.fromFrame && frame < entry.fromFrame + entry.durationFrames);
          if (section) {
            showOnly(dom.sectionScene);
            renderSection(frame, section);
          } else {
            showOnly(dom.ctaScene);
            renderCta(frame);
          }
        }
        renderSubtitle(frame);
      };

      preloadVisuals();
      window.__hf = {
        duration: durationSeconds,
        fps: video.fps,
        width: video.width,
        height: video.height,
        seek(time) {
          renderFrame(time * video.fps);
        }
      };
      window.__timelines = window.__timelines || {};
      window.__timelines[video.id] = {
        seek(time) {
          renderFrame(time * video.fps);
          return this;
        },
        pause() {
          return this;
        },
        duration() {
          return durationSeconds;
        },
        totalDuration() {
          return durationSeconds;
        }
      };
      renderFrame(0);
    </script>
