<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X 下書きプレビュー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Geist+Mono:wght@300;400&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">

    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="x-logo">𝕏</div>
        <span class="sidebar-title">DRAFTS</span>
        <button id="refresh-btn" class="refresh-btn" onclick="loadDraftList()" title="一覧を更新">↻</button>
      </div>

      <div class="search-wrap">
        <input
          id="search-input"
          class="search-input"
          type="text"
          placeholder="下書きを検索..."
          autocomplete="off"
          oninput="onSearch(this.value)"
        >
        <span class="search-icon">⌕</span>
      </div>

      <div id="draft-list" class="draft-list">
        <div class="loading">読み込み中...</div>
      </div>
    </aside>

    <!-- モバイル用タブバー -->
    <nav class="tab-bar" id="tab-bar">
      <button class="tab-btn active" id="tab-list-btn" onclick="switchTab('list')">一覧</button>
      <button class="tab-btn" id="tab-preview-btn" onclick="switchTab('preview')">プレビュー</button>
    </nav>

    <!-- メインプレビュー -->
    <main class="preview-area" id="preview-area">
      <div id="preview-content" class="preview-content">
        <div class="empty-state">
          <div class="x-logo-large">𝕏</div>
          <p>左の一覧から下書きを選んでください</p>
        </div>
      </div>
    </main>

  </div>

  <!-- 削除確認モーダル -->
  <div id="delete-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <p class="modal-msg">この下書きを削除しますか？<br>この操作は取り消せません。</p>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeDeleteModal()">キャンセル</button>
        <button class="btn-danger" id="modal-confirm-btn">削除する</button>
      </div>
    </div>
  </div>

  <!-- ツリー投稿ガイドモーダル -->
  <div id="thread-modal" class="modal-overlay" style="display:none" onclick="handleThreadModalBg(event)">
    <div class="modal thread-modal">
      <div class="thread-modal-header">
        <span id="thread-step-label" class="thread-step-label">パート 1 / 1</span>
        <button class="thread-close-btn" onclick="closeThreadModal()">✕</button>
      </div>
      <p id="thread-instruction" class="thread-instruction"></p>
      <div id="thread-part-content" class="thread-part-content"></div>
      <div class="thread-modal-actions">
        <button class="btn-ghost thread-copy-btn" onclick="copyThreadPart()">コピー</button>
        <button id="thread-open-btn" class="post-btn thread-open-btn" onclick="openXForThread()">
          <span>𝕏</span> X アプリで開く
        </button>
      </div>
      <div class="thread-nav">
        <button id="thread-prev-btn" class="btn-ghost" onclick="prevThreadPart()">← 前へ</button>
        <button id="thread-next-btn" class="mark-posted-btn" onclick="nextThreadPart()">次のパーツ →</button>
        <button id="thread-done-btn" class="mark-posted-btn" onclick="doneThreadPost()" style="display:none">✓ 投稿完了</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <!-- Twitter oEmbed 描画用（omit_script=true で embed ごとには入れない） -->
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</body>
</html>
